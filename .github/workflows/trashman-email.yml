name: Trashman weekly email

on:
  schedule:
    # 14:00 UTC = 10am ET (during EDT, the offset in effect now).
    # GitHub cron is always UTC and does NOT follow daylight saving:
    # in winter (EST) this fires at 9am ET, so bump to "0 15 * * 1" then.
    - cron: "0 14 * * 1"   # 1 = Monday
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python trashman/trashman_email.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
