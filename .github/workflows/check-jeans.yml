name: Check N&F Strong Guy size 31

on:
  schedule:
    # 14:00 UTC daily = 10am ET / 7am PT
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r jeans_alert/requirements.txt
      - run: python jeans_alert/check_jeans.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
